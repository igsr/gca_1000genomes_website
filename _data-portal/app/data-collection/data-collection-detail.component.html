<ng-container *ngIf="dc">
<h1>{{dc.title}}</h1>

<div class="row">
<div *ngIf="description" class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1 col-sm-10 col-sm-offset-1 col-xs-12">
  <div class="panel panel-default">
    <div [innerHtml]="description" class="panel-body"></div>
  </div>
</div>

<div class="col-md-6 col-md-offset-0 col-lg-5 col-lg-offset-1 col-sm-10 col-sm-offset-1 col-xs-12">
  <div class="panel panel-default">
    <div class="panel-heading">
      <h3 class="panel-title">{{dc.samples?.count}} samples</h3>
    </div>
    <div class="panel-body">
      <button class="btn btn-default center-block" (click)="searchSamplesExport()">Download the list</button>
      <ng-container *ngIf="sampleOffset > 0 || hasMoreSamples()">
        <button class="btn btn-default page-button pull-left" [ngClass]="{disabled: sampleOffset <=0}" (click)="sampleTablePrevious()">&#171; Previous</button>
        <button class="btn btn-default page-button pull-right" [ngClass]="{disabled: !hasMoreSamples()}" (click)="sampleTableNext()">Next &#187;</button>
      </ng-container>
      <table class="table table-striped table-condensed table-hover">
        <thead><tr>
          <th class="text-center">Sample</th>
        </tr></thead>
        <tbody>
          <tr *ngFor="let hit of sampleHits?.hits">
            <td class="text-center"><a [routerLink]="['/sample', hit._source.name]">{{hit._source.name}}</a></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="col-md-6 col-md-offset-0 col-lg-5 col-sm-10 col-sm-offset-1 col-xs-12">
  <div class="panel panel-default">
    <div class="panel-heading">
      <h3 class="panel-title">{{dc.populations?.count}} populations</h3>
    </div>
    <div class="panel-body">
      <button class="btn btn-default center-block" (click)="searchPopulationsExport()">Download the list</button>
      <ng-container *ngIf="populationOffset > 0 || hasMorePopulations()">
        <button class="btn btn-default page-button pull-left" [ngClass]="{disabled: populationOffset <=0}" (click)="populationTablePrevious()">&#171; Previous</button>
        <button class="btn btn-default page-button pull-right" [ngClass]="{disabled: !hasMorePopulations()}" (click)="populationTableNext()">Next &#187;</button>
      </ng-container>
      <table class="table table-striped table-condensed table-hover">
        <thead><tr>
          <th class="text-center">Populations</th>
        </tr></thead>
        <tbody>
          <tr *ngFor="let hit of populationHits?.hits">
            <td class="text-center"><a [routerLink]="['/population', hit._source.elasticId]">{{hit._source.description}}</a></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</div>

  <ng-container *ngIf="dc">
  <h2>Available data</h2>
  <data-collection-files [dataCollection]="dc" (filesChange)="files=$event">
      <table class="table table-striped table-condensed">
      <thead><tr>
        <th></th>
        <th>File</th>
        <th>Sample</th>
      </tr></thead>
      <tbody><tr *ngFor="let hit of files?.hits">
        <td><a [href]="hit._source.url"><span class="glyphicon glyphicon-download-alt" aria-hidden="true"></span></a></td>
        <td [innerHTML]="softHyphens(hit._source.url)"></td>
        <td>
          <a *ngIf="hit._source.samples?.length == 1" [routerLink]="['/sample', hit._source.samples[0]]"> {{ hit._source.samples[0] }}</a>
          <ng-container *ngIf="hit._source.samples?.length > 1">multi-sample</ng-container>
        </td>
      </tr></tbody>
      </table>
  </data-collection-files>
  </ng-container>

</ng-container>
